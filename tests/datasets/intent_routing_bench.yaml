# =====================================================================
# Intent-routing benchmark dataset (full tool coverage).
#
# One YAML record per natural-language utterance, paired with the tool
# we expect the router to dispatch to. ``category`` groups rows for the
# per-section breakdown in the report; ``notes`` is freeform context.
#
# Coverage goal: every tool registered by the bench's plugin set gets
# at least ~8 phrasings — formal, casual, terse, polite, with-args,
# without-args, typo'd, indirect — plus a "none" bucket for utterances
# that must fall back to llm_chat. The hand-graded label is the ground
# truth used by ``scripts/bench_intent_routing.py`` to compute accuracy,
# precision, recall, F1, and the per-tool confusion matrix.
#
# When adding rows: keep each one a single sentence, keep the
# ``expected_tool`` lowercase, prefer phrasings observed in real user
# logs, and add ``notes`` when the row is a regression guard for a
# specific issue.
# =====================================================================

