app:
  name: "FRIDAY"
  version: "0.1"
  theme: "dark"
models:
  chat:
    path: "models/gemma-2b-it.gguf"
    preload: true
    n_ctx: 4096
    n_batch: 512
    temperature: 0.7
  tool:
    path: "models/qwen2.5-7b-instruct.gguf"
    preload: true
    n_ctx: 2048
    n_batch: 256
    temperature: 0.1
routing:
  policy: "selective_executor"
  tool_timeout_ms: 2500
  tool_max_tokens: 96
  tool_target_max_tokens: 64
  tool_top_p: 0.2
  tool_json_response: true
gui:
  window_width: 500
  window_height: 700
  # We can add more specific gui configs here
modules:
  # Module specific configurations
  greeter:
    enabled: true

skills:
  mode: "local_first"
  weather:
    api_key: ""
    default_city: "Mumbai"
browser_automation:
  enabled: true
  allow_online: true
  preferred_browser: "chrome"
